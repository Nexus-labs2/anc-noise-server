<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANC PRO Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  font-family: sans-serif;
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl text-center mb-6 font-bold">🎧 ANC PRO Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- AUDIO PLAYERS -->
  <div class="glass p-4 rounded-xl col-span-3 text-center">
    <h2 class="mb-2">Audio Comparison</h2>

    <p>Original</p>
    <audio id="rawPlayer" controls></audio>

    <p class="mt-2">Cleaned</p>
    <audio id="cleanPlayer" controls></audio>
  </div>

  <div class="glass p-4 rounded-xl col-span-2">
    <h2 class="mb-2">FFT Spectrum</h2>
    <canvas id="fft"></canvas>
  </div>

  <div class="glass p-4 rounded-xl">
    <h2>Status</h2>
    <p id="status">Connecting...</p>
    <p id="latency">Latency: -- ms</p>
  </div>

  <div class="glass p-4 rounded-xl">
    <h2>Mic Levels</h2>
    <div class="space-y-2">
      <div class="h-3 bg-gray-700"><div id="r1" class="h-3 bg-green-400"></div></div>
      <div class="h-3 bg-gray-700"><div id="r2" class="h-3 bg-blue-400"></div></div>
      <div class="h-3 bg-gray-700"><div id="r3" class="h-3 bg-red-400"></div></div>
    </div>
  </div>

  <div class="glass p-4 rounded-xl col-span-2 text-center">
    <h2>Sound Direction</h2>
    <div id="direction" class="text-4xl mt-2">⬤</div>
  </div>

  <div class="glass p-4 rounded-xl col-span-3 text-center">
    <button onclick="toggleNR()" class="bg-purple-600 px-4 py-2 rounded">
      Toggle Noise Reduction
    </button>
    <p id="nrState" class="mt-2 text-lg">NR: ON</p>
  </div>

</div>

<script>
const WS_URL = "wss://brilliant-courtesy-production-183a.up.railway.app/dashboard";

let lastTime = Date.now();
let nrEnabled = true;

// ================= CHART =================
const fftChart = new Chart(document.getElementById("fft"), {
  type: "bar",
  data: { labels: [], datasets: [
    { data: [], backgroundColor: "lime" }
  ]},
  options: { animation:false, scales:{x:{display:false}} }
});

// ================= WS =================
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
  document.getElementById("status").innerText = "✅ Connected";
};

ws.onmessage = (e) => {
  const now = Date.now();
  document.getElementById("latency").innerText = "Latency: " + (now - lastTime) + " ms";
  lastTime = now;

  const d = JSON.parse(e.data);

  // ===== AUDIO PLAYBACK (WAV FIX) =====
  if (d.audio_raw && d.audio_clean) {
    const rawBlob = base64ToBlob(d.audio_raw);
    const cleanBlob = base64ToBlob(d.audio_clean);

    document.getElementById("rawPlayer").src = URL.createObjectURL(rawBlob);
    document.getElementById("cleanPlayer").src = URL.createObjectURL(cleanBlob);
  }

  // ===== RMS (FIXED SCALING) =====
  if (d.rms) {
    document.getElementById("r1").style.width = (d.rms[0]*100)+"%";
    document.getElementById("r2").style.width = (d.rms[1]*100)+"%";
    document.getElementById("r3").style.width = (d.rms[2]*100)+"%";

    let dir = "⬤";
    if (d.rms[0] > d.rms[1] && d.rms[0] > d.rms[2]) dir = "⬅️";
    else if (d.rms[1] > d.rms[0] && d.rms[1] > d.rms[2]) dir = "➡️";
    else if (d.rms[2] > d.rms[0] && d.rms[2] > d.rms[1]) dir = "⬆️";

    document.getElementById("direction").innerText = dir;
  }

  // ===== FFT =====
  if (d.fft_cleaned) {
    fftChart.data.labels = d.fft_cleaned.map((_,i)=>i);
    fftChart.data.datasets[0].data = d.fft_cleaned;
    fftChart.update();
  }
};

ws.onclose = () => {
  document.getElementById("status").innerText = "❌ Disconnected";
};

// ================= HELPERS =================
function base64ToBlob(base64) {
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);

  for (let i = 0; i < byteChars.length; i++) {
    byteNumbers[i] = byteChars.charCodeAt(i);
  }

  return new Blob([new Uint8Array(byteNumbers)], { type: "audio/wav" });
}

// ================= CONTROL =================
function toggleNR() {
  nrEnabled = !nrEnabled;

  ws.send(JSON.stringify({
    noise_reduction: nrEnabled
  }));

  document.getElementById("nrState").innerText =
    "NR: " + (nrEnabled ? "ON" : "OFF");
}
</script>

</body>
</html>
